
services:

  # ─── MongoDB ──────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: spotify_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - spotify_network

  # ─── Django Backend ───────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spotify_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    volumes:
      - ./ml/data:/app/ml/data
    depends_on:
      - mongodb
    networks:
      - spotify_network

  # ─── React Frontend ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spotify_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - spotify_network

# ─── Volumes ────────────────────────────────
volumes:
  mongodb_data:

# ─── Networks ───────────────────────────────
networks:
  spotify_network:
    driver: bridge